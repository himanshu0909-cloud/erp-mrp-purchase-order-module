<!DOCTYPE html>
<html>
<head>
    <title>PO System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-5">

<h2 class="mb-4 text-primary">Purchase Order System</h2>

<!-- Vendor Dropdown -->
<select id="vendor" class="form-control mb-3"></select>

<!-- Table -->
<table class="table" id="itemsTable">
    <thead>
        <tr>
            <th>Product</th>
            <th>Quantity</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- Buttons -->
<button class="btn btn-primary" onclick="addRow()">Add Product</button>
<button class="btn btn-success" onclick="submitOrder()">Submit</button>

<!-- Total -->
<h3 class="mt-3">Total: ₹ <span id="total">0</span></h3>

<script src="script.js"></script>
</body>
</html>
